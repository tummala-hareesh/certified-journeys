<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>PSPO I Certification Tracker</title> <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"> <style> :root{--green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;--blue:#378ADD;--blue-light:#E6F1FB;--blue-dark:#185FA5;--amber:#BA7517;--amber-light:#FAEEDA;--coral:#D85A30;--coral-light:#FAECE7;--coral-dark:#993C1D;--purple:#7F77DD;--purple-light:#EEEDFE;--bg:#F7F6F3;--surface:#FFFFFF;--surface2:#F1EFE8;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);--text:#1a1a18;--text2:#5f5e5a;--text3:#888780;--radius:12px;--radius-sm:8px;} @media(prefers-color-scheme:dark){:root{--bg:#18181a;--surface:#232326;--surface2:#2c2c30;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);--text:#f0efe9;--text2:#a0a09a;--text3:#666660;--green-light:#0d3d2c;--blue-light:#0a2540;--amber-light:#2a1f05;--coral-light:#2d1208;--purple-light:#1a1840;}} *{box-sizing:border-box;margin:0;padding:0;} body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;} .app{max-width:820px;margin:0 auto;padding:2rem 1.25rem 4rem;} .header{margin-bottom:2.5rem;} .header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;} .logo{display:flex;align-items:center;gap:10px;margin-bottom:6px;} .logo-dot{width:10px;height:10px;border-radius:50%;background:var(--green);} .logo-text{font-size:12px;font-weight:500;color:var(--green);letter-spacing:0.08em;text-transform:uppercase;} .header h1{font-size:28px;font-weight:600;color:var(--text);letter-spacing:-0.02em;} .header p{font-size:14px;color:var(--text2);margin-top:4px;} .reset-btn{font-size:12px;color:var(--text3);background:none;border:0.5px solid var(--border2);border-radius:99px;padding:5px 14px;cursor:pointer;font-family:inherit;transition:all 0.2s;white-space:nowrap;margin-top:6px;} .reset-btn:hover{color:var(--coral);border-color:var(--coral);} .progress-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.25rem;} .progress-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:1rem;} .progress-label{font-size:13px;color:var(--text2);} .progress-pct{font-size:36px;font-weight:600;color:var(--text);letter-spacing:-0.03em;line-height:1;} .bar-bg{background:var(--surface2);border-radius:99px;height:8px;overflow:hidden;} .bar-fill{height:100%;border-radius:99px;background:var(--green);transition:width 0.7s cubic-bezier(.4,0,.2,1);} .readiness{margin-top:10px;font-size:13px;color:var(--text2);} .readiness span{font-weight:500;} .readiness.ready span{color:var(--green);} .readiness.close span{color:var(--amber);} .readiness.early span{color:var(--coral);} .stats-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.25rem;} .stat{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:1rem;} .stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;} .stat-val{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-0.02em;font-family:'DM Mono',monospace;} .stat-val.ok{color:var(--green);} .stat-val.warn{color:var(--amber);} .stat-val.danger{color:var(--coral);} .tabs{display:flex;gap:2px;margin-bottom:1.25rem;background:var(--surface2);border-radius:99px;padding:4px;} .tab{flex:1;font-size:13px;padding:7px 10px;cursor:pointer;color:var(--text2);border-radius:99px;border:none;background:none;font-family:inherit;font-weight:400;transition:all 0.2s;text-align:center;} .tab.active{background:var(--surface);color:var(--text);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,0.08);} .tab:hover:not(.active){color:var(--text);} .panel{display:none;} .panel.active{display:block;} .day-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;transition:border-color 0.2s;} .day-card.completed{border-color:var(--green-dark);} .day-card.completed .day-num{background:var(--green);color:#fff;border-color:var(--green);} .day-header{display:flex;align-items:center;gap:12px;padding:1rem 1.1rem;cursor:pointer;user-select:none;} .day-header:hover{background:var(--surface2);} .day-num{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--text2);flex-shrink:0;font-family:'DM Mono',monospace;transition:all 0.2s;} .day-meta{flex:1;min-width:0;} .day-title{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;} .day-sub{font-size:12px;color:var(--text3);margin-top:1px;} .day-badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500;flex-shrink:0;} .badge-learn{background:var(--green-light);color:var(--green-dark);} .badge-practice{background:var(--blue-light);color:var(--blue-dark);} .badge-review{background:var(--amber-light);color:var(--amber);} .badge-exam{background:var(--coral-light);color:var(--coral-dark);} .chevron{font-size:12px;color:var(--text3);flex-shrink:0;transition:transform 0.2s;} .day-card.open .chevron{transform:rotate(180deg);} .day-body{display:none;padding:0 1.1rem 1.1rem;border-top:0.5px solid var(--border);} .day-card.open .day-body{display:block;} .tip-box{background:var(--green-light);border-left:3px solid var(--green);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:0.75rem 1rem;margin:1rem 0 0.75rem;} .tip-box p{font-size:13px;color:var(--green-dark);line-height:1.6;} .tip-box strong{font-weight:600;} .task-list{margin-bottom:0.75rem;} .task{display:flex;align-items:flex-start;gap:10px;padding:7px 0;font-size:13px;color:var(--text2);border-bottom:0.5px solid var(--border);line-height:1.5;} .task:last-child{border-bottom:none;} .task-bullet{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:6px;} .resources-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;} .res-pill{font-size:11px;padding:4px 12px;border-radius:99px;background:var(--surface2);border:0.5px solid var(--border);color:var(--text2);cursor:default;} .score-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;} .score-row label{font-size:12px;color:var(--text2);} .score-row input{width:72px;font-size:13px;padding:5px 10px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:'DM Mono',monospace;} .score-badge{font-size:12px;font-weight:500;padding:3px 10px;border-radius:99px;} .complete-btn{width:100%;font-size:13px;padding:9px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:none;color:var(--text2);cursor:pointer;font-family:inherit;transition:all 0.2s;font-weight:400;} .complete-btn:hover{background:var(--green-light);color:var(--green-dark);border-color:var(--green);} .complete-btn.done{background:var(--green-light);color:var(--green-dark);border-color:var(--green);font-weight:500;} .topic-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;} .topic-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem;} .topic-card h4{font-size:13px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.4;} .t-bar-bg{background:var(--surface2);border-radius:99px;height:5px;margin-bottom:5px;overflow:hidden;} .t-bar-fill{height:100%;border-radius:99px;transition:width 0.7s cubic-bezier(.4,0,.2,1);} .t-pct{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;} .res-section{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:10px;} .res-section h3{font-size:13px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:1rem;} .res-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border);gap:12px;} .res-row:last-child{border-bottom:none;} .res-name{font-size:14px;color:var(--text);font-weight:500;} .res-desc{font-size:12px;color:var(--text2);margin-top:1px;} .res-tag{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500;flex-shrink:0;} .tag-free{background:var(--green-light);color:var(--green-dark);} .tag-paid{background:var(--coral-light);color:var(--coral-dark);} .tag-essential{background:var(--blue-light);color:var(--blue-dark);} .tag-book{background:var(--amber-light);color:var(--amber);} .info-box{background:var(--surface2);border-radius:var(--radius-sm);padding:0.85rem 1rem;font-size:13px;color:var(--text2);line-height:1.6;} .info-box strong{color:var(--text);font-weight:500;} .quiz-wrap{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;} .quiz-progress{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:1rem;} .quiz-q{font-size:15px;font-weight:500;color:var(--text);line-height:1.6;margin-bottom:1.25rem;} .quiz-opt{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border:0.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all 0.15s;line-height:1.5;} .quiz-opt:hover{border-color:var(--border2);color:var(--text);background:var(--surface2);} .quiz-opt.correct{background:var(--green-light);border-color:var(--green);color:var(--green-dark);} .quiz-opt.wrong{background:var(--coral-light);border-color:var(--coral);color:var(--coral-dark);} .opt-letter{font-weight:600;min-width:18px;font-family:'DM Mono',monospace;font-size:12px;margin-top:1px;} .quiz-exp{margin-top:1rem;padding:1rem;background:var(--surface2);border-radius:var(--radius-sm);font-size:13px;color:var(--text2);line-height:1.7;display:none;border-left:3px solid var(--green);} .quiz-exp.show{display:block;} .quiz-exp strong{color:var(--text);font-weight:500;} .quiz-actions{display:flex;gap:8px;margin-top:1rem;} .next-btn{font-size:13px;padding:8px 18px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:none;color:var(--text2);cursor:pointer;font-family:inherit;display:none;transition:all 0.2s;} .next-btn:hover{background:var(--surface2);color:var(--text);} .quiz-score-wrap{text-align:center;padding:2rem 0;} .quiz-score-big{font-size:48px;font-weight:600;font-family:'DM Mono',monospace;letter-spacing:-0.03em;} .quiz-score-big.pass{color:var(--green);} .quiz-score-big.fail{color:var(--coral);} .quiz-score-label{font-size:14px;color:var(--text2);margin-top:6px;} .retake-btn{margin-top:1.25rem;font-size:13px;padding:9px 20px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:none;color:var(--text2);cursor:pointer;font-family:inherit;} .retake-btn:hover{background:var(--surface2);} .persist-note{font-size:12px;color:var(--text3);text-align:center;margin-top:2rem;padding-top:1rem;border-top:0.5px solid var(--border);} .persist-note span{color:var(--green);} @media(max-width:560px){.stats-grid{grid-template-columns:repeat(3,minmax(0,1fr));}.topic-grid{grid-template-columns:1fr;}.tab{font-size:11px;padding:6px 4px;}.header h1{font-size:22px;}} </style> </head> <body> <div class="app"> <div class="header"> <div class="header-top"> <div> <div class="logo"><div class="logo-dot"></div><span class="logo-text" id="logo-label">PSPO I · 14-Day Tracker</span></div> <h1>Certification learning plan</h1> <p>Senior level · Scrum.org Professional Scrum Product Owner I</p> </div> <button class="reset-btn" onclick="resetAll()">Reset progress</button> </div> </div> <div class="progress-card"> <div class="progress-top"> <div><div class="progress-label">Overall completion</div></div> <div class="progress-pct" id="pct-display">0%</div> </div> <div class="bar-bg"><div class="bar-fill" id="main-bar" style="width:0%"></div></div> <div class="readiness early" id="readiness-row">Status: <span id="status-txt">Not started</span></div> </div> <div class="stats-grid"> <div class="stat"><div class="stat-label">Days done</div><div class="stat-val" id="days-done">0/14</div></div> <div class="stat"><div class="stat-label">Avg score</div><div class="stat-val" id="avg-score">—</div></div> <div class="stat"><div class="stat-label">Days left</div><div class="stat-val" id="days-left">14</div></div> </div> <div class="tabs"> <button class="tab active" onclick="showPanel('schedule',this)">Schedule</button> <button class="tab" onclick="showPanel('topics',this)">Topics</button> <button class="tab" onclick="showPanel('resources',this)">Resources</button> <button class="tab" onclick="showPanel('quiz',this)">Quiz</button> <button class="tab" onclick="showPanel('fork',this)">Your fork</button> </div> <div id="panel-schedule" class="panel active"></div> <div id="panel-topics" class="panel"></div> <div id="panel-resources" class="panel"></div> <div id="panel-quiz" class="panel"></div> <div id="panel-fork" class="panel"></div> <div class="persist-note" id="persist-note">Progress auto-saved in your browser · <span>localStorage</span> · No account needed</div> </div> <script> /* ── Auto-detect owner / repo from URL ── */ const _host = window.location.hostname || ''; const _pathname = window.location.pathname || ''; const _protocol = window.location.protocol || ''; function detectOwner(host, pathname, protocol) { if (!host || host === 'localhost' || host === '127.0.0.1' || host === '::1') return 'local'; if (protocol === 'file:') return 'local'; if (host.endsWith('.github.io'))  return host.replace('.github.io', ''); if (host.endsWith('.gitlab.io'))  return host.replace('.gitlab.io', ''); if (host.endsWith('.netlify.app')) return host.replace('.netlify.app', ''); if (host.endsWith('.vercel.app')) return host.replace('.vercel.app', ''); if (host.endsWith('.pages.dev'))  return host.replace('.pages.dev', ''); const sub = host.split('.')[0]; return sub && sub !== 'www' ? sub : host; } function detectRepo(pathname) { const parts = pathname.split('/').filter(Boolean); return parts.length > 0 ? parts[0] : 'pspo-certified'; } const _owner = detectOwner(_host, _pathname, _protocol); const _repo   = detectRepo(_pathname); const STORAGE_KEY = _owner + '_' + _repo + '_v1'; /* ── Study data ── */ const days = [ { title:"Scrum Guide deep read #1", badge:"learn", sub:"Week 1 · Foundation", tasks:["Read Scrum Guide 2020 cover to cover — approx 45 mins","Highlight every sentence that mentions the Product Owner","The guide uses 'Product Owner', never 'product manager' — exact language matters","Do not skip the Scrum Values section — the exam tests these directly"], resources:["Scrum Guide PDF (scrumguides.org)","Scrum Guide audio version (YouTube)"], tip:"As a senior professional, resist mapping this to how your company does it. Read it like a legal document — every word is deliberate.", hasScore:false }, { title:"Scrum Guide read #2 + first open assessment", badge:"practice", sub:"Week 1 · Foundation", tasks:["Re-read Scrum Guide — this time focus on artifacts and their commitments","Take the Scrum.org PSPO Open Assessment (free, no login needed)","Log your score — don't worry about the number yet","Read the explanation for every single wrong answer"], resources:["PSPO Open Assessment (scrum.org/open-assessments)","Scrum.org Learning Path"], tip:"The 3 commitments are heavily tested: Product Goal → Product Backlog, Sprint Goal → Sprint Backlog, Definition of Done → Increment.", hasScore:true }, { title:"Product Owner accountabilities", badge:"learn", sub:"Week 1 · Core concepts", tasks:["Study the PO's accountabilities in the Scrum Guide word for word","Key rule: the PO is ONE person — never a committee","The PO can delegate backlog work but retains full accountability","PO owns the 'why' — Developers own the 'how'"], resources:["Scrum Guide §Product Owner","Mikhail Lapshin quiz (PO filter)"], tip:"Classic exam trap: 'The team can help manage the backlog' — true, but the PO retains accountability. Always pick the PO-owns-it answer.", hasScore:false }, { title:"Product Backlog mastery", badge:"learn", sub:"Week 1 · Core concepts", tasks:["The backlog is 'ordered' — not 'prioritized'. Exact word matters on the exam","PBIs contain: description, order, estimate, and value","Refinement is ongoing — not a Scrum event — max 10% of team capacity","Know what happens to the backlog when a Sprint is cancelled"], resources:["Scrum Guide §Product Backlog","Mikhail Lapshin learning mode"], tip:"If an exam answer says 'prioritized backlog' — that may be the wrong option. Scrum.org uses 'ordered' exclusively.", hasScore:false }, { title:"Sprint events and timebox rules", badge:"learn", sub:"Week 1 · Events", tasks:["Memorize all 5 Scrum events and their exact timeboxes","Sprint Review (4h max): PO presents backlog state to stakeholders","Sprint Retrospective (3h max): Scrum Team inspects itself","Sprint Planning (8h max): the Sprint Goal is created here"], resources:["Scrum Guide §Events","Scrum.org open assessment"], tip:"Sprint Review ≠ Sprint Demo. The exam tests that the Review is about inspection and adaptation — not just showing completed work.", hasScore:false }, { title:"Product Vision and value delivery", badge:"learn", sub:"Week 1 · Strategy", tasks:["Study the Product Goal — the long-term objective for the product","The Product Goal lives inside the Product Backlog","The PO decides when to release — not the Scrum Team or stakeholders","Study: release planning and forecasting concepts for the PO"], resources:["Scrum Guide §Product Goal","Professional Product Owner book (McGreal) ch.1–3"], tip:"Value is subjective — the PO defines it, the Scrum Team maximizes it. This distinction appears in many scenario questions.", hasScore:false }, { title:"Mid-week mock exam + gap analysis", badge:"practice", sub:"Week 1 · Assessment", tasks:["Take Mikhail Lapshin PSPO quiz in Learning Mode (all 80 questions)","Log your score below — target 80%+","List every topic area where you got questions wrong","Spend 1 hour re-reading those exact Scrum Guide sections"], resources:["Mikhail Lapshin PSPO quiz (mlapshin.com)","Scrum Guide (targeted re-read)"], tip:"If you score below 75%, focus all extra time on Product Backlog ordering and PO accountability questions — these are highest frequency.", hasScore:true }, { title:"Stakeholders, customers and business strategy", badge:"learn", sub:"Week 2 · Advanced", tasks:["The PO manages stakeholders — not the Scrum Master","PO collaborates with stakeholders but is NOT obligated to accept all feedback","Business strategy: understand ROI and value-based backlog ordering","The Sprint Review is the primary stakeholder feedback loop in Scrum"], resources:["Scrum.org PSPO competency areas","Mikhail Lapshin — stakeholder question set"], tip:"The Scrum Master facilitates events but does not own stakeholder relationships — that is a very common exam distractor.", hasScore:false }, { title:"Forecasting and release planning", badge:"learn", sub:"Week 2 · Advanced", tasks:["Understand velocity, story points, and release forecasting concepts","Burn-down and burn-up charts: the PO uses these to track progress","Release planning: PO owns the when — the Developers own the how","Scaled: know the basic Nexus framework and scaled PO responsibilities"], resources:["Scrum.org PSPO competencies","Scrum Guide §Sprint Review"], tip:"The exam won't ask you to calculate velocity — it will ask who is responsible for forecast visibility. That is the PO.", hasScore:false }, { title:"Scrum values and empiricism deep dive", badge:"learn", sub:"Week 2 · Foundations", tasks:["5 Scrum Values: Commitment, Focus, Openness, Respect, Courage — know all","3 pillars of empiricism: Transparency, Inspection, Adaptation","How does each Scrum Value apply specifically to the PO role?","What breaks empiricism: hidden work, absent PO, no Definition of Done"], resources:["Scrum Guide §Values","Scrum.org learning path — empiricism module"], tip:"Values questions often have 2 plausible answers. Always pick the one that maximises transparency or direct stakeholder value.", hasScore:false }, { title:"Full timed mock exam #1", badge:"exam", sub:"Week 2 · Assessment", tasks:["Take Mikhail Lapshin PSPO quiz in Real Mode — 80 questions, 60 minutes","Simulate real conditions: no notes, no interruptions, no Scrum Guide","Log your score below — target 90%+","Review every wrong answer and note the exact Scrum Guide section"], resources:["Mikhail Lapshin Real Mode","Scrum Guide (post-exam targeted review)"], tip:"If you score below 85% here, do not book the exam yet. Spend Days 12–13 on your specific weak areas only.", hasScore:true }, { title:"Weak area intensive review", badge:"review", sub:"Week 2 · Consolidation", tasks:["List your 3 weakest topic areas from Day 11 mock exam","Re-read those Scrum Guide sections one final time","Retake the Scrum.org PSPO Open Assessment — target 100%","Write a 1-page PO rules cheat sheet from memory, then verify it against the Guide"], resources:["Scrum Guide (targeted)","Scrum.org PSPO Open Assessment"], tip:"Writing a cheat sheet from memory then verifying it is the single most effective revision technique for this type of closed-logic exam.", hasScore:false }, { title:"Full timed mock exam #2 + readiness check", badge:"exam", sub:"Week 2 · Assessment", tasks:["Take a second full 80-question timed mock (PrepForScrum or Lapshin again)","Focus on pacing: you have ~45 seconds per question maximum","Flag uncertain questions and return — never leave one blank","If you are scoring 90%+ consistently across both mocks: you are ready"], resources:["PrepForScrum mock exam (prepforscrum.com)","Mikhail Lapshin Real Mode"], tip:"90%+ across two different mock providers is the gold standard. Different question sets expose different blind spots.", hasScore:true }, { title:"Final light review + book the exam", badge:"exam", sub:"Week 2 · Exam day", tasks:["Light re-read of Scrum Guide: PO section and artifacts only","Do NOT try to learn anything new today — consolidate only","Book your PSPO I exam at scrum.org — $200 USD, password never expires","Rest well. You are prepared."], resources:["scrum.org/assessments — exam booking page"], tip:"The exam is technically open-book, but there is no time to look anything up. 60 minutes, 80 questions, 85% to pass. Trust your preparation.", hasScore:false } ]; const topics = [ { name:"Product Owner accountabilities", color:"#1D9E75", days:[2,3,7,10] }, { name:"Product Backlog management",     color:"#378ADD", days:[3,6,11] }, { name:"Product Goal and vision",        color:"#BA7517", days:[5,9,10] }, { name:"Scrum events and timeboxes",     color:"#D85A30", days:[4,8,10] }, { name:"Stakeholder management",         color:"#7F77DD", days:[7,9,11] }, { name:"Forecasting and release planning",color:"#0F6E56",days:[5,8,12] }, { name:"Scrum values and empiricism",    color:"#639922", days:[1,9,10,11] }, { name:"Business strategy and value",    color:"#993C1D", days:[5,7,12] } ]; const quizzes = [ { q:"The Product Owner wants to cancel the current Sprint because the Sprint Goal has become obsolete. Who has the authority to cancel it?", opts:["The Scrum Master, as process authority","Only the Product Owner","Any member of the Scrum Team","The Product Owner with Developer agreement"], correct:1, exp:"<strong>Only the Product Owner</strong> can cancel a Sprint. This is one of the very few unilateral powers the PO holds. The Scrum Guide is explicit: the Product Owner is the only person with authority to cancel the Sprint — and only when the Sprint Goal has become obsolete." }, { q:"The Scrum Guide describes the Product Backlog as which of the following?", opts:["A prioritized list of features requested by s
